<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Health System</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../css/Auth/Auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <a href="#" class="home-icon" title="Back to Home">
        <i class="fa-solid fa-house"></i>
    </a>
    <button class="auth-theme-toggle" id="authThemeToggle">
        <i class="fa-solid fa-moon"></i>
    </button>
    <div class="login-container">
        <div class="login-card register-card">
            <div class="login-icon">
                <i class="fa-solid fa-user-plus"></i>
            </div>

            <h1>Create Account</h1>
            <p class="subtitle">Join our health system to access quality healthcare services.</p>

            <form id="registerForm" class="login-form">
                <div class="img-preview-container"
                    style="display: flex; flex-direction: column; align-items: center; margin-bottom: 2rem;">
                    <img src="../../images/patient-profile.png" alt="Profile Preview" id="regImgPreview"
                        style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid var(--primary); margin-bottom: 1rem;">
                    <label for="regImg" class="upload-label"
                        style="background: var(--bg-body); padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; border: 1px dashed var(--border);">
                        <i class="fa-solid fa-camera"></i> Upload Photo
                    </label>
                    <input type="file" id="regImg" accept="image/*" style="display: none;">
                </div>

                <div class="form-section-title">Select Account Type</div>

                <div class="role-selector">
                    <label class="role-option">
                        <input type="radio" name="role" value="patient" checked onchange="toggleRegistrationForm()">
                        <span class="role-btn">
                            <i class="fa-solid fa-user"></i>
                            Patient
                        </span>
                    </label>
                    <label class="role-option">
                        <input type="radio" name="role" value="doctor" onchange="toggleRegistrationForm()">
                        <span class="role-btn">
                            <i class="fa-solid fa-user-doctor"></i>
                            Doctor
                        </span>
                    </label>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="fullname">Full Name *</label>
                        <input type="text" id="fullname" placeholder="Enter Your Name" required>
                        <small class="input-hint">Letters and spaces only (2-50 characters)</small>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" placeholder="Enter Your Email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" placeholder="Enter Your Phone Number" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Password *</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="Enter Your Password" required>
                            <i class="fa-solid fa-eye toggle-password"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password *</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirmPassword" placeholder="Please Confirm Password" required>
                            <i class="fa-solid fa-eye toggle-password"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="dob">Date of Birth *</label>
                        <input type="date" id="dob" required max="">
                    </div>

                </div>


                <div id="doctorFields" style="display: none;">
                    <div class="form-section-title"><i class="fa-solid fa-graduation-cap"></i> Professional Credentials
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="specialty">Specialty *</label>
                            <select id="specialty" class="form-input" required>
                                <option value="">Select Specialty</option>
                                <option value="General Practice">General Practice</option>
                                <option value="Cardiology">Cardiology</option>
                                <option value="Dermatology">Dermatology</option>
                                <option value="Pediatrics">Pediatrics</option>
                                <option value="Neurology">Neurology</option>
                                <option value="Orthopedics">Orthopedics</option>
                                <option value="Psychiatry">Psychiatry</option>
                                <option value="Oncology">Oncology</option>
                                <option value="Gynecology">Gynecology</option>
                                <option value="Anesthesiology">Anesthesiology</option>
                                <option value="Radiology">Radiology</option>
                                <option value="Surgery">Surgery</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="experience">Years of Experience *</label>
                            <select id="experience" required>
                                <option value="">Select Experience</option>
                                <option value="1">1 Year</option>
                                <option value="2">2 Years</option>
                                <option value="3">3 Years</option>
                                <option value="4">4 Years</option>
                                <option value="5">5 Years</option>
                                <option value="6-10">6-10 Years</option>
                                <option value="11-15">11-15 Years</option>
                                <option value="15+">Over 15 Years</option>
                            </select>
                            <small class="input-hint">Total years in medical practice</small>
                        </div>
                        <div class="form-group">
                            <label for="appointmentPrice">appointmentPrice</label>
                            <input type="text" id="appointmentPrice" placeholder="appointment price" required>
                        </div>
                    </div>

                </div>

                <button type="submit" class="btn-login">Create Account</button>

                <a href="login.html" class="auth-link">Already have an account? Login</a>
            </form>
        </div>
    </div>

    <script src="../../storage.js"></script>
    <script src="../../js/Auth/auth.js"></script>
</body>

</html>
