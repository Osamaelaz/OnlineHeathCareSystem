<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard - Online Health System</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../css/Doctor/profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">

        <div class="sidebar">
            <div class="sidebar-header">
                <div class="brand-icon-only">
                    <i class="fa-solid fa-user-doctor"></i>
                </div>
            </div>

            <div class="sidebar-nav">
                <a href="doctor-db.html" class="nav-item" data-tooltip="Dashboard">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span class="item-text">Dashboard</span>
                </a>
                <a href="My Schedule.html" class="nav-item" data-tooltip="My Schedule">
                    <i class="fa-solid fa-calendar-check"></i>
                    <span class="item-text">My Schedule</span>
                </a>
                <a href="My Patients.html" class="nav-item" data-tooltip="My Patients">
                    <i class="fa-solid fa-hospital-user"></i>
                    <span class="item-text">My Patients</span>
                </a>
                <a href="Prescriptions.html" class="nav-item" data-tooltip="Prescriptions">
                    <i class="fa-solid fa-file-prescription"></i>
                    <span class="item-text">Prescriptions</span>
                </a>
                <a href="working-days.html" class="nav-item" data-tooltip="Working Days">
                    <i class="fa-solid fa-calendar-week"></i>
                    <span class="item-text">Working Days</span>
                </a>
                <a href="profile.html" class="nav-item active" data-tooltip="Profile">
                    <i class="fa-solid fa-user"></i>
                    <span class="item-text">Profile</span>
                </a>
            </div>

            <div class="sidebar-footer">
                <a href="../Auth/login.html" class="nav-item" data-tooltip="Logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span class="item-text">Logout</span>
                </a>
            </div>
        </div>

        <div class="nav">
            <div class="top-bar">
                <div class="top-bar-left">
                    <button id="sidebarToggle" class="icon-btn">
                        <i class="fa-solid fa-bars"></i>
                    </button>

                </div>

                <div class="top-bar-right">
                    <button id="themeToggle" class="icon-btn" title="Toggle Theme">
                        <i class="fa-regular fa-moon"></i>
                    </button>
                    <div class="divider-vertical"></div>
                    <div class="user-profile">
                        <span class="user-name">Dr. Aziz</span>
                        <div class="profile-img-container">
                            <img src="../../images/doctor-profile.png" alt="Profile"
                                class="profile-img profile-img-blue">
                            <span class="status-dot-profile"></span>
                        </div>
                    </div>
                </div>
            </div>

            <main class="main-content">
                <div class="dashboard-row">
                    <div class="card profile-card">
                        <div class="avatar-container">
                            <img src="../../images/doctor-profile.png" alt="Dr. Aziz">
                            <div class="edit-photo-btn">
                                <i class="fa-solid fa-camera"></i>
                            </div>
                        </div>
                        <h3>Dr. Aziz Mansour</h3>
                        <p>Senior Cardiologist</p>
                        <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border);">
                        <div class="salary-card">
                            <span>Total Earnings</span>
                            <h2 id="doctor-salary">0 EGP</h2>
                        </div>
                        <button class="submit-btn">Change Photo</button>
                    </div>

                    <div class="card settings-card" style="flex: 2;">
                        <h3><i class="fa-solid fa-cog"></i> Account Settings</h3>
                        <form id="profileForm">
                            <div class="form-row" style="display: flex; gap: 15px;">
                                <div class="form-group" style="flex: 1;">
                                    <label>First Name</label>
                                    <input type="text" value="Aziz">
                                </div>
                                <div class="form-group" style="flex: 1;">
                                    <label>Last Name</label>
                                    <input type="text" value="Mansour">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" value="aziz@health.com">
                            </div>
                            <div class="form-group">
                                <label>Specialization</label>
                                <select id="specialization-select">
                                    <option value="Cardiology">Cardiology</option>
                                    <option value="Neurology">Neurology</option>
                                    <option value="Pediatrics">Pediatrics</option>
                                    <option value="Orthopedics">Orthopedics</option>
                                    <option value="Dermatology">Dermatology</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Session Price (EGP)</label>
                                <input type="number" id="appointment-price" placeholder="200">
                            </div>
                            <button type="submit" class="submit-btn" style="width: 200px;">Save Changes</button>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="../../storage.js"></script>
    <script src="../../script.js"></script>
    <script src="../../js/Doctor/profile.js"></script>
</body>

</html>
